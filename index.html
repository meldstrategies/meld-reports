<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meld Reports Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', Calibri, sans-serif;
      background: #f5f5f5;
      color: #000;
      min-height: 100vh;
    }

    /* ── Gate ── */
    #gate {
      position: fixed; inset: 0;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .gate-card {
      background: #fff;
      border: 1px solid #D0E8C5;
      border-radius: 8px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 400px; width: 90%;
    }
    .gate-logo { width: 140px; margin-bottom: 24px; }
    .gate-card h2 { font-size: 15pt; font-weight: 700; color: #71BF44; margin-bottom: 6px; }
    .gate-card p { font-size: 10pt; color: #666; margin-bottom: 20px; }
    .gate-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid #D0E8C5; border-radius: 5px;
      font-family: inherit; font-size: 11pt;
      margin-bottom: 12px; outline: none;
    }
    .gate-input:focus { border-color: #71BF44; }
    .gate-btn {
      width: 100%; padding: 10px;
      background: #71BF44; color: #fff;
      font-family: inherit; font-size: 11pt; font-weight: 700;
      border: none; border-radius: 5px; cursor: pointer;
    }
    .gate-btn:hover { background: #5da836; }
    .gate-error { color: #c0392b; font-size: 10pt; margin-top: 8px; display: none; }

    /* ── Portal ── */
    #portal { display: none; }

    header {
      background: #fff;
      border-bottom: 2px solid #71BF44;
      padding: 14px 32px;
      display: flex; align-items: center; gap: 20px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    header img { height: 36px; }
    header h1 { font-size: 14pt; font-weight: 700; color: #71BF44; flex: 1; }

    .controls {
      max-width: 1100px; margin: 28px auto 0; padding: 0 24px;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .controls input[type="search"] {
      flex: 1; min-width: 200px;
      padding: 9px 14px; border: 1px solid #D0E8C5;
      border-radius: 6px; font-family: inherit; font-size: 10.5pt;
      outline: none;
    }
    .controls input[type="search"]:focus { border-color: #71BF44; }
    .filter-btn {
      padding: 8px 16px; border: 1px solid #D0E8C5;
      border-radius: 20px; background: #fff;
      font-family: inherit; font-size: 10pt; cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #71BF44; color: #fff; border-color: #71BF44;
    }

    .grid {
      max-width: 1100px; margin: 24px auto 48px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff; border-radius: 8px;
      border: 1px solid #e0e0e0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      padding: 20px 22px 18px;
      display: flex; flex-direction: column; gap: 8px;
      text-decoration: none; color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(113,191,68,0.18); border-color: #71BF44; }

    .card-type {
      font-size: 8.5pt; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: #71BF44;
    }
    .card-title { font-size: 12pt; font-weight: 700; line-height: 1.3; }
    .card-topic { font-size: 10pt; color: #555; }
    .card-meta {
      font-size: 9pt; color: #999;
      display: flex; justify-content: space-between;
      margin-top: auto; padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }
    .badge {
      font-size: 8pt; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; background: #F2FAF0; color: #71BF44;
    }
    .badge.confidential { background: #fef0f0; color: #c0392b; }
    .badge.client { background: #f0f4fe; color: #2563eb; }

    .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 11pt; }
  </style>
</head>
<body>

<!-- Gate -->
<div id="gate">
  <div class="gate-card">
    <img class="gate-logo" src="assets/meld_logo.png" alt="Meld Strategies" onerror="this.style.display='none'" />
    <h2>Meld Reports</h2>
    <p>Enter the team passphrase to access the portal.</p>
    <input class="gate-input" type="password" id="passphrase" placeholder="Passphrase" autocomplete="off" />
    <button class="gate-btn" onclick="checkPass()">Enter Portal</button>
    <div class="gate-error" id="err">Incorrect passphrase. Please try again.</div>
  </div>
</div>

<!-- Portal -->
<div id="portal">
  <header>
    <img src="assets/meld_logo.png" alt="Meld Strategies" onerror="this.style.display='none'" />
    <h1>Meld Reports</h1>
  </header>

  <div class="controls">
    <input type="search" id="search" placeholder="Search reports…" oninput="render()" />
    <button class="filter-btn active" data-type="All" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" data-type="Research" onclick="setFilter('Research',this)">Research</button>
    <button class="filter-btn" data-type="Product Assessment" onclick="setFilter('Product Assessment',this)">Product Assessment</button>
    <button class="filter-btn" data-type="Integration" onclick="setFilter('Integration',this)">Integration</button>
    <button class="filter-btn" data-type="Specification" onclick="setFilter('Specification',this)">Specification</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
  const REPORTS = [
  {
    "id": "salto-space-integration-report",
    "title": "Integration Capability Report \u2014 Salto Space",
    "type": "Integration",
    "topic": "Access Control Research",
    "audience": "Internal",
    "date": "2026-03-30",
    "filename": "salto-space-integration-report.html",
    "drive_file_id": "13fpAd9zDAZmpuGUmojmnAwbNnNkh1tzT",
    "drive_view_link": "reports/salto-space-integration-report.html",
    "gdoc_link": "https://drive.google.com/file/d/13fpAd9zDAZmpuGUmojmnAwbNnNkh1tzT/view?usp=drivesdk",
    "pdf_link": "https://drive.google.com/file/d/1WATuDRcn9lzdzZXduKX03L4C34ZPGas5/view?usp=drivesdk"
  },
  {
    "id": "starrez-integration-report",
    "title": "Integration Capability Report \u2014 StarRez",
    "type": "Integration",
    "topic": "Residential Management Systems",
    "audience": "Internal",
    "date": "2026-03-31",
    "filename": "starrez-integration-report.html",
    "drive_file_id": "1bfxUyZ5zEtMG5KDjUrDKZOxvUdA3FkBV",
    "drive_view_link": "reports/starrez-integration-report.html",
    "gdoc_link": "https://drive.google.com/file/d/1bfxUyZ5zEtMG5KDjUrDKZOxvUdA3FkBV/view?usp=drivesdk",
    "pdf_link": "https://drive.google.com/file/d/1Py9xSQCPIwAIbTKMuIZ38b00raQs1-RG/view?usp=drivesdk"
  },
  {
    "id": "tuya-integration-report",
    "title": "Integration Capability Report \u2014 Tuya Development Platform",
    "type": "Integration",
    "topic": "IoT Platform Research",
    "audience": "Internal",
    "date": "2026-03-31",
    "filename": "tuya-integration-report.html",
    "drive_file_id": "1ycvswAv4xi7DaT5rQxIJRZgmAA8Piojb",
    "drive_view_link": "reports/tuya-integration-report.html",
    "gdoc_link": "https://drive.google.com/file/d/1ycvswAv4xi7DaT5rQxIJRZgmAA8Piojb/view?usp=drivesdk",
    "pdf_link": "https://drive.google.com/file/d/1yaSD_OELhplq4e1TtIx7qky2ywBXebu1/view?usp=drivesdk"
  },
  {
    "id": "starrez-salto-space-integration-report",
    "title": "StarRez to Salto Space Integration \u2014 Tenant Onboarding & Digital Key Issuance",
    "type": "Integration",
    "topic": "Access Control / Property Management Integration",
    "audience": "Internal",
    "date": "2026-03-31",
    "filename": "starrez-salto-space-integration-report.html",
    "drive_file_id": "10aUMJaXc8Wqpr-i6ICwLU-ZZyv_y6iT-",
    "drive_view_link": "reports/starrez-salto-space-integration-report-gate.html",
    "gdoc_link": "https://drive.google.com/file/d/10aUMJaXc8Wqpr-i6ICwLU-ZZyv_y6iT-/view?usp=drivesdk",
    "pdf_link": "https://drive.google.com/file/d/1ybE4Ie3FOorMpr-TVK5hX3kEbLhzogC7/view?usp=drivesdk"
  },
  {
    "id": "smart-building-technology-assessment-200-george-st",
    "title": "Smart Building Technology Assessment \u2014 200 George Street, Sydney",
    "type": "Research",
    "topic": "200 George Street",
    "audience": "Internal",
    "date": "2026-04-06",
    "filename": "smart-building-technology-assessment-200-george-st.html",
    "drive_file_id": "",
    "drive_view_link": "reports/smart-building-technology-assessment-200-george-st-gate.html",
    "gdoc_link": "https://docs.google.com/document/d/11ne7hC3uMLLuKYScQNGgOOLsANnLd3Lb2LAIXOu_lok/edit",
    "pdf_link": ""
  }
];

  const HASH = '9dec22e7d4d12b6afa43bd7fd7ab54c5d9cf26d6b2bced62d11a67b6250d40c3';
  let activeFilter = 'All';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkPass() {
    const val = document.getElementById('passphrase').value.trim();
    const hash = await sha256(val);
    if (hash === HASH) {
      sessionStorage.setItem('meld_auth', '1');
      document.getElementById('gate').style.display = 'none';
      document.getElementById('portal').style.display = 'block';
      render();
    } else {
      document.getElementById('err').style.display = 'block';
    }
  }

  document.getElementById('passphrase')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPass();
  });

  if (sessionStorage.getItem('meld_auth') === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
    render();
  }

  function setFilter(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const q = (document.getElementById('search')?.value || '').toLowerCase();
    const filtered = REPORTS.filter(r => {
      const matchType = activeFilter === 'All' || r.type === activeFilter;
      const matchSearch = !q ||
        r.title.toLowerCase().includes(q) ||
        (r.topic || '').toLowerCase().includes(q) ||
        (r.type || '').toLowerCase().includes(q);
      return matchType && matchSearch;
    }).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    const grid = document.getElementById('grid');
    if (!filtered.length) {
      grid.innerHTML = '<div class="empty">No reports match your search.</div>';
      return;
    }

    grid.innerHTML = filtered.map(r => {
      const badgeClass = r.audience === 'Confidential' ? 'confidential' : r.audience === 'Client-facing' ? 'client' : '';
      return `<a class="card" href="${r.drive_view_link || '#'}">
        <div class="card-type">${r.type || ''}</div>
        <div class="card-title">${r.title}</div>
        ${r.topic ? `<div class="card-topic">${r.topic}</div>` : ''}
        <div class="card-meta">
          <span>${r.date || ''}</span>
          <span class="badge ${badgeClass}">${r.audience || 'Internal'}</span>
        </div>
      </a>`;
    }).join('');
  }
</script>
</body>
</html>
