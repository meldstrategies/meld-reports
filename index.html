<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meld Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #71BF44;
      --green-light: #F2FAF0;
      --green-mid:   #D0E8C5;
      --black:       #000000;
      --grey-text:   #555555;
      --grey-bg:     #f7f7f7;
      --table-head:  #E1E1E1;
      --white:       #ffffff;
    }

    body {
      font-family: 'Quicksand', Calibri, sans-serif;
      font-size: 11pt;
      color: var(--black);
      background: var(--grey-bg);
      min-height: 100vh;
    }



    /* ── TOPBAR ── */
    .topbar {
      background: var(--white);
      border-bottom: 3px solid var(--green);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .topbar img { height: 36px; }
    .topbar-title {
      font-size: 14pt;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.01em;
    }
    .topbar-user {
      font-size: 9pt;
      color: var(--grey-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-user span {
      background: var(--green-light);
      border: 1px solid var(--green-mid);
      border-radius: 20px;
      padding: 3px 12px;
      font-weight: 600;
      color: #2e7d00;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 40px 60px;
    }

    /* ── CONTROLS BAR ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
      background: var(--white);
      border: 1px solid var(--green-mid);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .controls label {
      font-size: 9pt;
      font-weight: 700;
      color: var(--grey-text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 4px;
    }

    .controls select,
    .controls input[type="text"] {
      font-family: 'Quicksand', Calibri, sans-serif;
      font-size: 10pt;
      border: 1.5px solid var(--green-mid);
      border-radius: 6px;
      padding: 6px 10px;
      background: var(--white);
      color: var(--black);
      outline: none;
      transition: border-color 0.15s;
    }
    .controls select:focus,
    .controls input[type="text"]:focus { border-color: var(--green); }

    .controls input[type="text"] { width: 220px; }

    .controls .spacer { flex: 1; }

    .count-label {
      font-size: 9pt;
      color: var(--grey-text);
      white-space: nowrap;
    }

    /* ── GROUP HEADER ── */
    .group-header {
      font-size: 11pt;
      font-weight: 700;
      color: var(--green);
      border-bottom: 2px solid var(--green-mid);
      padding-bottom: 6px;
      margin: 28px 0 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── REPORT CARD ── */
    .report-card {
      background: var(--white);
      border: 1px solid #e8e8e8;
      border-left: 4px solid var(--green);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.15s, border-left-color 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .report-card:hover {
      box-shadow: 0 3px 14px rgba(113,191,68,0.15);
      border-left-color: #4fa020;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 11.5pt;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 9pt;
      color: var(--grey-text);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 8.5pt;
      font-weight: 700;
    }
    .badge-type-research    { background: #e3f0ff; color: #1a5fa8; }
    .badge-type-product     { background: #fff3e0; color: #b35c00; }
    .badge-type-integration { background: #f3e5f5; color: #6a1b9a; }
    .badge-type-specification { background: #e8f5e9; color: #1b5e20; }
    .badge-audience-confidential { background: #fde8e8; color: #b30000; }
    .badge-audience-client  { background: var(--green-light); color: #2e7d00; }

    .card-arrow {
      color: var(--green);
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--grey-text);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 11pt; }

    /* ── FOOTER ── */
    .portal-footer {
      text-align: center;
      font-size: 8.5pt;
      color: #aaa;
      padding: 24px;
      border-top: 1px solid var(--green-mid);
      margin-top: 48px;
    }
  
    /* ── AUTH GATE ── */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--white);
    }
    #auth-gate img { width: 180px; margin-bottom: 28px; }
    #auth-gate h2  { font-size: 18pt; color: var(--green); margin-bottom: 8px; }
    #auth-gate p   { font-size: 10pt; color: var(--grey-text); margin-bottom: 20px; }
    #auth-gate input[type="password"] {
      font-family: 'Quicksand', Calibri, sans-serif;
      font-size: 12pt;
      border: 2px solid var(--green-mid);
      border-radius: 8px;
      padding: 10px 16px;
      width: 260px;
      outline: none;
      text-align: center;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    #auth-gate input[type="password"]:focus { border-color: var(--green); }
    #auth-gate button {
      font-family: 'Quicksand', Calibri, sans-serif;
      font-size: 11pt;
      font-weight: 700;
      background: var(--green);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 32px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #auth-gate button:hover { background: #5da535; }
    #auth-error { display: none; color: #b30000; font-size: 10pt; margin-top: 10px; }

    /* ── PORTAL SHELL ── */
    #portal { display: none; }

  </style>
</head>

    "gdoc_link": "https://drive.google.com/file/d/1ycvswAv4xi7DaT5rQxIJRZgmAA8Piojb/view?usp=drivesdk",
    "pdf_link": "https://drive.google.com/file/d/1yaSD_OELhplq4e1TtIx7qky2ywBXebu1/view?usp=drivesdk"
  }
];

  /* ── TYPE ICONS ── */
  const TYPE_ICONS = {
    'Research':           '🔬',
    'Product Assessment': '📦',
    'Integration':        '🔗',
    'Specification':      '📐',
  };

  const TYPE_BADGE_CLASS = {
    'Research':           'badge-type-research',
    'Product Assessment': 'badge-type-product',
    'Integration':        'badge-type-integration',
    'Specification':      'badge-type-specification',
  };

  /* ── POPULATE TOPIC FILTER ── */
  function populateTopics() {
    const topics = [...new Set(REPORTS.map(r => r.topic).filter(Boolean))].sort();
    const sel = document.getElementById('filter-topic');
    topics.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      sel.appendChild(o);
    });
  }

  /* ── FILTER + SORT ── */
  function filtered() {
    const q     = document.getElementById('search').value.toLowerCase();
    const type  = document.getElementById('filter-type').value;
    const topic = document.getElementById('filter-topic').value;
    const sort  = document.getElementById('sort-by').value;

    let list = REPORTS.filter(r => {
      const matchQ     = !q || r.title.toLowerCase().includes(q) || (r.topic||'').toLowerCase().includes(q);
      const matchType  = !type  || r.type  === type;
      const matchTopic = !topic || r.topic === topic;
      return matchQ && matchType && matchTopic;
    });

    list.sort((a, b) => {
      if (sort === 'date-desc') return b.date.localeCompare(a.date);
      if (sort === 'date-asc')  return a.date.localeCompare(b.date);
      if (sort === 'title-asc') return a.title.localeCompare(b.title);
      if (sort === 'title-desc')return b.title.localeCompare(a.title);
      return 0;
    });

    return list;
  }

  /* ── FORMAT DATE ── */
  function fmtDate(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-');
    return new Date(y,m-1,d).toLocaleDateString('en-AU', {day:'numeric',month:'short',year:'numeric'});
  }

  /* ── BUILD CARD HTML ── */
  function cardHTML(r) {
    const icon  = TYPE_ICONS[r.type] || '📄';
    const tbadge = TYPE_BADGE_CLASS[r.type] || '';
    const abadge = r.audience === 'Confidential' ? '<span class="badge badge-audience-confidential">Confidential</span>'
                 : r.audience === 'Client-facing' ? '<span class="badge badge-audience-client">Client</span>'
                 : '';
    return `
      <a class="report-card" href="${r.drive_view_link}" target="_blank" rel="noopener">
        <div class="card-icon">${icon}</div>
        <div class="card-body">
          <div class="card-title">${r.title}</div>
          <div class="card-meta">
            <span><span class="badge ${tbadge}">${r.type}</span></span>
            ${r.topic ? `<span>📁 ${r.topic}</span>` : ''}
            <span>🗓 ${fmtDate(r.date)}</span>
            ${abadge}
          </div>
        </div>
        <div class="card-arrow">›</div>
      </a>`;
  }

  /* ── RENDER ── */
  function render() {
    const list    = filtered();
    const groupBy = document.getElementById('group-by').value;
    const el      = document.getElementById('report-list');

    document.getElementById('count-label').textContent =
      list.length === 1 ? '1 report' : `${list.length} reports`;

    if (list.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No reports match your filters.</p></div>`;
      return;
    }

    if (groupBy === 'none') {
      el.innerHTML = list.map(cardHTML).join('');
      return;
    }

    // Group
    const groupKey = r =>
      groupBy === 'type'       ? r.type :
      groupBy === 'topic'      ? (r.topic || 'Uncategorised') :
      groupBy === 'date-month' ? (r.date ? r.date.slice(0,7) : 'Unknown') : '';

    const groups = {};
    list.forEach(r => {
      const k = groupKey(r);
      if (!groups[k]) groups[k] = [];
      groups[k].push(r);
    });

    el.innerHTML = Object.keys(groups).sort().map(k => {
      const label = groupBy === 'date-month'
        ? new Date(k + '-01').toLocaleDateString('en-AU', {month:'long', year:'numeric'})
        : k;
      return `<div class="group-header">${label}</div>` + groups[k].map(cardHTML).join('');
    }).join('');
  }

  /* ── PASSPHRASE AUTH ── */
  const PASS_HASH = '9dec22e7d4d12b6afa43bd7fd7ab54c5d9cf26d6b2bced62d11a67b6250d40c3';

  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkPass() {
    const val = document.getElementById('passphrase').value;
    const hash = await sha256(val);
    if (hash === PASS_HASH) {
      try { sessionStorage.setItem('meld_auth', 'true'); } catch(e) {}
      showPortal();
    } else {
      document.getElementById('auth-error').style.display = 'block';
    }
  }

  function showPortal() {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('portal').style.display    = 'block';
    populateTopics();
    render();
  }

  window.addEventListener('DOMContentLoaded', () => {
    const gate = document.getElementById('auth-gate');
    if (!gate) {
      populateTopics();
      render();
    } else {
      try {
        if (sessionStorage.getItem('meld_auth') === 'true') {
          showPortal();
          return;
        }
      } catch(e) {}
    }
  });
</script>
